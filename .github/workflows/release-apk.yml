name: Release APK

on:
  push:
    branches:
      - main

# Minimal permissions — only what's needed
permissions:
  contents: write  # required to create GitHub Releases

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        # Write the keystore from the base64 secret — never echoed to logs
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Write keystore.properties
        # Use env vars to write the file — values are never interpolated into shell strings
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          {
            echo "MYAPP_DEBUG_STORE_PASSWORD=android"
            echo "MYAPP_DEBUG_KEY_ALIAS=androiddebugkey"
            echo "MYAPP_DEBUG_KEY_PASSWORD=android"
            echo "MYAPP_RELEASE_STORE_PASSWORD=${RELEASE_STORE_PASSWORD}"
            echo "MYAPP_RELEASE_KEY_ALIAS=${RELEASE_KEY_ALIAS}"
            echo "MYAPP_RELEASE_KEY_PASSWORD=${RELEASE_KEY_PASSWORD}"
          } > android/keystore.properties

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Verify APK was signed
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK path: $APK"
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner verify --verbose "$APK"

      - name: Compute version tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.version.outputs.tag }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Clean up keystore files
        # Always run — ensures secrets are wiped from the runner even if a prior step fails
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/keystore.properties
